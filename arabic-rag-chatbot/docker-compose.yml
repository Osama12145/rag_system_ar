version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: arabic-rag-chatbot/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./app_data.db}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173}
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: arabic-rag-chatbot/Dockerfile.frontend
    ports:
      - "8080:8080"
    environment:
      BACKEND_UPSTREAM: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
