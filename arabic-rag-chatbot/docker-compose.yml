# ================================================
# docker-compose.yml — Production Multi-Container Setup
# ================================================
# Deploys two services:
#   • api      — FastAPI backend (uses Dockerfile.backend)
#   • streamlit — Streamlit frontend (uses Dockerfile.frontend)
#
# Note: PostgreSQL & Qdrant are external (hosted on Coolify)
# ================================================

version: '3.8'

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Backend reads DATABASE_URL and QDRANT_URL from .env or Coolify secrets
      - BACKEND_URL=http://localhost:8000   # helpful for frontend self-discovery
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Streamlit Frontend ─────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rag-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Tell frontend where backend lives (inside Docker bridge network: http://api:8000)
      # In Coolify, set BACKEND_URL=http://api.internal:8000 or similar
      - BACKEND_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# ── External services (PostgreSQL & Qdrant) are NOT included here.
#    They are provisioned separately in Coolify and connected via:
#      • DATABASE_URL  → PostgreSQL connection string
#      • QDRANT_URL    → Qdrant HTTP URL
#
# Example Coolify env vars:
#   DATABASE_URL=postgresql+asyncpg://postgres:PASSWORD@postgresql-database-x0kwsk40gs4ccog84gccc04g:5432/chatbot_db
#   QDRANT_URL=http://qdrant-eso00kc0k8ww0k4g00wkcw0g:6333
